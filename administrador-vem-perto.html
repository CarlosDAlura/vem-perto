<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vem Perto | Administração</title><link rel="stylesheet" href="vem-perto.css"></head><body><header class="bar"><div class="logo">vem<b>perto</b></div><b>Administração</b><div class="grow"></div><button class="btn" id="logout">Sair</button></header><main class="wrap"><div class="layout"><nav class="panel menu"><button class="on">Dashboard</button><button>Lojas</button><button>Entregadores</button><button>Clientes</button><button>Pedidos ao vivo</button><button>Cupons</button><button>Taxas e categorias</button><button>Chamados</button></nav><section><div class="heading"><h2>Visão geral</h2><button class="btn red" id="notify">Enviar notificação</button></div><div class="stats"><div class="stat"><small>Pedidos hoje</small><strong>128</strong></div><div class="stat"><small>Faturamento</small><strong>R$ 4.860</strong></div><div class="stat"><small>Lojas ativas</small><strong id="storeN">12</strong></div><div class="stat"><small>Entregadores online</small><strong>8</strong></div></div><section class="panel"><div class="heading" style="margin:0 0 10px"><h2>Solicitações de lojas</h2></div><div id="stores"></div></section><section class="panel" style="margin-top:15px"><div class="heading" style="margin:0 0 10px"><h2>Entregadores para aprovação</h2></div><div id="drivers"></div></section></section></div></main><script>const $=s=>document.querySelector(s);function render(){let stores=JSON.parse(localStorage.getItem('vpStores')||'[]'),drivers=JSON.parse(localStorage.getItem('vpDrivers')||'[]');$('#storeN').textContent=12+stores.filter(x=>x.status==='Aprovada').length;$('#stores').innerHTML=stores.length?stores.map((x,i)=>`<div class="row"><span>🏪 <b>${x.name}</b><br><small>${x.category} · Doc: ${x.file}</small></span><span class="tag wait right">${x.status}</span>${x.status==='Pendente'?`<button class="btn red" data-s="${i}">Aprovar</button>`:''}</div>`).join(''):'<p class="notice">Nenhuma nova solicitação.</p>';$('#drivers').innerHTML=drivers.length?drivers.map((x,i)=>`<div class="row"><span>🛵 <b>${x.name}</b><br><small>CPF: ${x.cpf} · ${x.docs}</small></span><span class="tag wait right">${x.status}</span>${x.status==='Pendente'?`<button class="btn red" data-d="${i}">Aprovar</button>`:''}</div>`).join(''):'<p class="notice">Nenhum entregador aguardando aprovação.</p>'}document.body.onclick=e=>{let b=e.target;if(b.dataset.s!==undefined){let x=JSON.parse(localStorage.getItem('vpStores')||'[]');x[b.dataset.s].status='Aprovada';localStorage.setItem('vpStores',JSON.stringify(x));render()}if(b.dataset.d!==undefined){let x=JSON.parse(localStorage.getItem('vpDrivers')||'[]');x[b.dataset.d].status='Aprovado';localStorage.setItem('vpDrivers',JSON.stringify(x));render()}};$('#notify').onclick=()=>alert('Notificação demonstrativa enviada.');render()</script></body></html>
